services:
  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      REDIS_HOST: redis
      PRODUCT_CACHE_TTL: 60s
      SIMULATED_DB_LATENCY: 550ms
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    image: nginx:1.27-alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  redis-data:
